<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記事一覧・データベース｜サーチド出版</title>
<meta name="description" content="サーチド出版の全記事を、キーワード検索とカテゴリ・タグ・シリーズ・公開年での絞り込み、並び替えで探せるデータベース。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<script src="/assets/articles-index.js"></script>
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="brand" href="/">サーチド出版<span class="en">SEARCHED&nbsp;PRESS</span></a>
    <nav class="nav">
      <a href="/shinsho.html">サーチド新書</a>
      <a href="/research.html">リサーチ</a>
      <a href="/articles.html">データベース</a>
      <a href="/pricing.html">購読・購入</a>
      <a href="/contact.html">お問い合わせ</a>
    </nav>
  </div>
</header>

<main>
  <section class="page-head">
    <div class="wrap">
      <h1>記事データベース</h1>
      <p>キーワード検索と絞り込みで、過去のすべての論考にアクセスできる。読みたい一篇に最短で辿り着くための索引である。</p>
    </div>
  </section>

  <section class="section" style="padding-top:40px;">
    <div class="wrap">
      <div class="filters">
        <div class="search-box">
          <input type="search" id="q" placeholder="キーワードで検索（タイトル・リード・タグ）">
        </div>
        <select id="f-category"><option value="">カテゴリ：すべて</option></select>
        <select id="f-series"><option value="">シリーズ：すべて</option></select>
        <select id="f-year"><option value="">公開年：すべて</option></select>
        <select id="f-sort">
          <option value="new">新着順</option>
          <option value="old">古い順</option>
          <option value="long">文字数の多い順</option>
          <option value="short">文字数の少ない順</option>
        </select>
      </div>

      <div id="count" class="note" style="margin-bottom:18px;"></div>
      <div id="list" class="article-list"></div>
      <div id="empty" class="no-result">該当する記事が見つからなかった。条件を変えて再度お試しいただきたい。</div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script>
var ARTICLES = (window.ARTICLES || []).slice();

var fmtDate = function (s) { return (s || '').replace(/-/g, "."); };
var readMin = function (c) { return Math.max(1, Math.round((c || 0) / 800)); };
var yearOf = function (s) { return (s || '').slice(0, 4); };
var esc = function (s) { return (s || '').replace(/[&<>]/g, function (c) { return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); };

function fill(sel, values) {
  var el = document.getElementById(sel);
  var uniq = [];
  values.forEach(function (v) { if (v && uniq.indexOf(v) < 0) uniq.push(v); });
  uniq.sort().forEach(function (v) {
    var o = document.createElement("option"); o.value = v; o.textContent = v; el.appendChild(o);
  });
}
fill("f-category", ARTICLES.map(function (a) { return a.category; }));
fill("f-series", ARTICLES.map(function (a) { return a.series; }));
fill("f-year", ARTICLES.map(function (a) { return yearOf(a.published_at); }));

function render() {
  var q = document.getElementById("q").value.trim().toLowerCase();
  var fc = document.getElementById("f-category").value;
  var fs = document.getElementById("f-series").value;
  var fy = document.getElementById("f-year").value;
  var sort = document.getElementById("f-sort").value;

  var rows = ARTICLES.filter(function (a) {
    if (fc && a.category !== fc) return false;
    if (fs && a.series !== fs) return false;
    if (fy && yearOf(a.published_at) !== fy) return false;
    if (q) {
      var hay = (a.title + " " + (a.lead||'') + " " + (a.tags || []).join(" ") + " " + a.category).toLowerCase();
      if (hay.indexOf(q) < 0) return false;
    }
    return true;
  });

  rows.sort(function (a, b) {
    if (sort === "new") return (b.published_at||'').localeCompare(a.published_at||'');
    if (sort === "old") return (a.published_at||'').localeCompare(b.published_at||'');
    if (sort === "long") return (b.char_count||0) - (a.char_count||0);
    if (sort === "short") return (a.char_count||0) - (b.char_count||0);
    return 0;
  });

  var list = document.getElementById("list");
  list.innerHTML = rows.map(function (a) {
    return '<article class="article-row">'
      + '<div>'
      + '<div class="cat">' + esc(a.category) + (a.series ? ' ｜ ' + esc(a.series) : '') + '</div>'
      + '<h3><a href="' + a.noteUrl + '" target="_blank" rel="noopener">' + esc(a.title) + '</a></h3>'
      + '<p class="lead">' + esc(a.lead || '') + '</p>'
      + '<div class="meta"><span>' + fmtDate(a.published_at) + '</span><span>約' + readMin(a.char_count) + '分（' + (a.char_count||0).toLocaleString() + '字）</span></div>'
      + '<div class="tags">' + (a.tags || []).map(function (t) { return '<span class="tag">#' + esc(t) + '</span>'; }).join("") + '</div>'
      + '</div>'
      + '<div class="row-aside"><span class="access-pill free">' + esc(a.access_type || '無料') + '</span></div>'
      + '</article>';
  }).join("");

  document.getElementById("count").textContent = "全 " + rows.length + " 件";
  document.getElementById("empty").style.display = rows.length ? "none" : "block";
}

["q","f-category","f-series","f-year","f-sort"].forEach(function (id) {
  document.getElementById(id).addEventListener("input", render);
});
render();
</script>
<script src="/assets/footer.js"></script>
</body>
</html>
